name: Update Contributions

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch contributions and update README
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: 0xDELUXA
        run: |
          python3 << 'EOF'
          import urllib.request
          import urllib.parse
          import json
          import re
          import os

          username = os.environ["GH_USERNAME"]
          token = os.environ["GH_TOKEN"]

          def gh_request(url, accept=None):
              req = urllib.request.Request(url)
              req.add_header("Authorization", f"Bearer {token}")
              req.add_header("Accept", accept or "application/vnd.github+json")
              req.add_header("X-GitHub-Api-Version", "2022-11-28")
              req.add_header("User-Agent", "readme-updater")
              with urllib.request.urlopen(req) as res:
                  return json.loads(res.read().decode())

          repos = {}
          seen_urls = set()

          def add_to_repo(repo, title, url):
              if repo == f"{username}/{username}":
                  return
              if url in seen_urls:
                  return
              if repo not in repos:
                  repos[repo] = []
              if len(repos[repo]) < 3:
                  repos[repo].append({"title": title, "url": url})
                  seen_urls.add(url)

          query = urllib.parse.quote(f"type:pr author:{username}")
          pr_url = f"https://api.github.com/search/issues?q={query}&per_page=100&sort=updated"
          data = gh_request(pr_url)
          for pr in data.get("items", []):
              if "pull_request" not in pr:
                  continue
              repo = pr["repository_url"].replace("https://api.github.com/repos/", "")
              is_pytorch = repo == "pytorch/pytorch"
              merged_at = pr["pull_request"].get("merged_at")
              if merged_at or (is_pytorch and pr.get("state") == "closed"):
                  add_to_repo(repo, pr["title"], pr["html_url"])

          try:
              commit_query = urllib.parse.quote(f"co-author:{username}")
              commit_url = f"https://api.github.com/search/commits?q={commit_query}&per_page=100&sort=author-date"
              commit_data = gh_request(commit_url, accept="application/vnd.github.cloak-preview+json")
              for item in commit_data.get("items", []):
                  repo = item["repository"]["full_name"]
                  title = item["commit"]["message"].split("\n")[0]
                  html_url = item["html_url"]
                  add_to_repo(repo, title, html_url)
          except Exception as e:
              print(f"Co-author search failed: {e}")

          repo_stars = {}
          for repo in repos:
              try:
                  info = gh_request(f"https://api.github.com/repos/{repo}")
                  repo_stars[repo] = info.get("stargazers_count", 0)
              except:
                  repo_stars[repo] = 0

          sorted_repos = sorted(repos.items(), key=lambda x: repo_stars.get(x[0], 0), reverse=True)

          trimmed = []
          total = 0
          for repo, prs in sorted_repos:
              if total >= 10:
                  break
              allowed = prs[:10 - total]
              trimmed.append((repo, allowed))
              total += len(allowed)
          sorted_repos = trimmed

          rows = []
          for repo, prs in sorted_repos:
              count = len(prs)
              for i, pr in enumerate(prs):
                  if i == 0:
                      repo_cell = f'<td rowspan="{count}" style="padding: 14px 16px; vertical-align: middle; font-size: 13px; border: 1px solid #30363d; white-space: nowrap;"><code>{repo}</code></td>'
                  else:
                      repo_cell = ""
                  pr_cell = f'<td style="padding: 14px 16px; border: 1px solid #30363d;"><a href="{pr["url"]}">{pr["title"]}</a></td>'
                  rows.append(f"<tr>{repo_cell}{pr_cell}</tr>")

          table = (
              '<table style="width: 100%; border-collapse: collapse;">\n'
              '<thead><tr>'
              '<th style="padding: 12px 16px; border: 1px solid #30363d; text-align: left;">Repository</th>'
              '<th style="padding: 12px 16px; border: 1px solid #30363d; text-align: left;">Contribution</th>'
              '</tr></thead>\n'
              '<tbody>\n'
              + "\n".join(rows) +
              '\n</tbody>\n</table>'
          )

          new_section = f"<!-- CONTRIBUTIONS:START -->\n{table}\n<!-- CONTRIBUTIONS:END -->"

          with open("README.md", "r") as f:
              content = f.read()

          updated = re.sub(
              r"<!-- CONTRIBUTIONS:START -->.*?<!-- CONTRIBUTIONS:END -->",
              new_section,
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w") as f:
              f.write(updated)

          print(f"README updated with {sum(len(v) for v in repos.values())} contributions across {len(repos)} repos!")
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update contributions [skip ci]"
          git push
